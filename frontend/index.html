<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Datasheet QA 系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-4">📘 Datasheet QA 系统</h2>

    <!-- 上传 PDF -->
    <div class="card p-4 shadow-sm mb-4">
        <h5>上传 PDF</h5>
        <input type="file" id="pdfFile" class="form-control mb-3">
        <button class="btn btn-primary w-100" onclick="uploadPDF()">上传并处理</button>
        <div id="uploadStatus" class="mt-3 text-success"></div>
    </div>

    <!-- 提问 -->
    <div class="card p-4 shadow-sm mb-4">
        <h5>提问</h5>
        <input type="text" id="questionInput" class="form-control mb-3" placeholder="例如：HC4407 的 RDSon 是多少？">
        <button class="btn btn-success w-100" onclick="askQuestion()">提问</button>
    </div>

    <!-- 回答 -->
    <div class="card p-4 shadow-sm mb-4">
        <h5>回答</h5>
        <pre id="answerBox" class="p-3 bg-white border rounded" style="min-height: 120px;"></pre>
    </div>

    <!-- 相关 chunks -->
    <div class="card p-4 shadow-sm">
        <h5>相关内容（Related Chunks）</h5>
        <pre id="chunkBox" class="p-3 bg-white border rounded" style="min-height: 120px;"></pre>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
